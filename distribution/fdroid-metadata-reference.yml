# F-Droid build recipe reference
# Submit to https://gitlab.com/fdroid/fdroiddata by opening a PR that adds
# metadata/io.github.raven_wing.cuview.yml with the content below.

Categories:
  - Productivity
License: MIT
AuthorName: raven-wing
SourceCode: https://github.com/raven-wing/cuview
IssueTracker: https://github.com/raven-wing/cuview/issues
Donate: https://buymeacoffee.com/raven_wing

# NonFreeNet: the app connects exclusively to ClickUp, a proprietary hosted service.
AntiFeatures:
  - NonFreeNet

AutoName: CU View

Summary: Home screen widget showing tasks from a ClickUp view
Description: |-
  CU View puts your ClickUp tasks directly on your home screen as an Android widget.

  Pick any ClickUp view and its tasks appear on your home screen, auto-refreshing
  every 15 minutes via WorkManager. Tap a task to open it in the ClickUp app.

  The OAuth redirect is handled by a Cloudflare Worker (source in the repo under
  worker/) so no client secret is embedded in the APK.

Builds:
  - versionName: 0.1.0
    versionCode: 1
    commit: v0.1.0
    subdir: app
    gradle:
      - release
    # No secrets needed: client_id and worker URL are committed to gradle.properties
