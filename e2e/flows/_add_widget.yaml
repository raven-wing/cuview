# Subflow: place the CU View widget on the home screen.
#
# Pre-condition:  home screen is visible.
# Post-condition: WidgetConfigActivity is open ("Configure CU View" is visible).
#
# Pixel Launcher widget placement:
#   long-press empty home screen space → tap "Widgets" → search "CU" →
#   tap result row to expand → long-press preview card →
#   launcher opens WidgetConfigActivity.
#
# Search input is "CU" not "CU View": typing a complete English word ("View")
# causes Gboard autocomplete to append a trailing space → no results.
# Using search avoids the unpredictable scroll/pin behaviour that differs
# between host-GPU (local) and software-GPU (CI) rendering modes.
appId: io.github.raven_wing.cuview
---
# ── Open the widget picker ────────────────────────────────────────────────────
- pressKey: Home
- longPressOn:
    point: "50%, 40%"
- extendedWaitUntil:
    visible: "Widgets"
    timeout: 5000
- tapOn: "Widgets"

# ── Search for the widget ─────────────────────────────────────────────────────
- tapOn: "Search"
- inputText: "CU"
- extendedWaitUntil:
    visible: "CU View"
    timeout: 20000

# ── Expand and long-press the preview card ───────────────────────────────────
# "CU" in the search bar avoids Gboard autocomplete that adds a trailing space
# and breaks the search. The result row title is the only "CU View" in the tree.
- tapOn:
    text: "CU View"
- extendedWaitUntil:
    visible: "Displays tasks from a CU View"
    timeout: 5000
- longPressOn:
    point: "50%, 55%"

# ── WidgetConfigActivity opens with a real widget ID ─────────────────────────
- extendedWaitUntil:
    visible: "Configure CU View"
    timeout: 15000
