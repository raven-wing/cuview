# Subflow: place the CU View widget on the home screen.
#
# Pre-condition:  home screen is visible.
# Post-condition: WidgetConfigActivity is open ("Configure CU View" is visible).
#
# Pixel Launcher widget placement:
#   long-press empty home screen space → tap "Widgets" → scroll to "CU View" →
#   tap to expand → scroll to widget preview → long-press preview card →
#   launcher opens WidgetConfigActivity.
appId: io.github.raven_wing.cuview
---
# ── Open the widget picker ────────────────────────────────────────────────────
- pressKey: Home
- longPressOn:
    point: "50%, 40%"
- extendedWaitUntil:
    visible: "Widgets"
    timeout: 5000
- tapOn: "Widgets"

# ── Scroll to and expand the CU View section ─────────────────────────────────
- scrollUntilVisible:
    element:
      text: "CU View"
    direction: DOWN
    timeout: 15000
- tapOn: "CU View"

# ── Scroll to the widget preview card and long-press it ───────────────────────
# After expansion the preview card appears below the row header, potentially
# off-screen. scrollUntilVisible brings the card's unique description text into
# view, then longPressOn triggers placement without relying on fixed coordinates.
- scrollUntilVisible:
    element:
      text: "Displays tasks from a CU View"
    direction: DOWN
    timeout: 10000
# Long-press the preview IMAGE (upper portion of the card), not the text labels
# below it — Pixel Launcher only initiates placement from the rendered preview area.
- longPressOn:
    point: "50%, 45%"

# ── WidgetConfigActivity opens with a real widget ID ─────────────────────────
- extendedWaitUntil:
    visible: "Configure CU View"
    timeout: 15000
