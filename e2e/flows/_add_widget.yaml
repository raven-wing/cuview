# Subflow: place the CU View widget on the home screen.
#
# Pre-condition:  home screen is visible.
# Post-condition: WidgetConfigActivity is open ("Configure CU View" is visible).
#
# Pixel Launcher widget placement:
#   long-press empty home screen space → tap "Widgets" → scroll to "CU View" →
#   tap to expand → long-press the preview IMAGE → launcher opens config activity.
appId: io.github.raven_wing.cuview
---
# ── Open the widget picker ────────────────────────────────────────────────────
- pressKey: Home
- longPressOn:
    point: "50%, 40%"
- extendedWaitUntil:
    visible: "Widgets"
    timeout: 5000
- tapOn: "Widgets"

# ── Scroll to and expand the CU View section ─────────────────────────────────
- scrollUntilVisible:
    element:
      text: "CU View"
    direction: DOWN
    timeout: 15000
- tapOn: "CU View"

# ── Long-press the widget preview image to initiate placement ─────────────────
# After expansion the preview card is pinned to the top of the picker.
# Wait for the description to confirm the card is rendered, then long-press
# at y=25% which falls inside the preview image in both local (host GPU) and
# CI (swiftshader) environments — above the text labels that start at ~48%.
- scrollUntilVisible:
    element:
      text: "Displays tasks from a CU View"
    direction: DOWN
    timeout: 10000
- longPressOn:
    point: "50%, 28%"

# ── WidgetConfigActivity opens with a real widget ID ─────────────────────────
- extendedWaitUntil:
    visible: "Configure CU View"
    timeout: 15000
