# Flow 02: connect in app → disconnect → reconnect → add widget → select → save.
#
# Regression test for the OAuth callback routing bug.
# In the old architecture, Chrome opened in a separate task that couldn't deliver
# RESULT_OK back to the Launcher. The new architecture fixes this by moving OAuth
# entirely into MainActivity (normal app flow), so the widget config never touches
# Chrome and the result delivery is straightforward.
#
# Run via: ./e2e/run.sh 02_disconnect_reconnect.yaml
#
# Edit the env block below to match your ClickUp workspace.
appId: io.github.raven_wing.cuview
env:
  CUE_SPACE: "Mammals"
  CUE_FOLDER: "Hoofed Animals"
  CUE_LIST: "Horse"
---
# ── 0. Connect in the app ─────────────────────────────────────────────────────
- launchApp
- runFlow: ./_connect.yaml
- assertVisible: "Connected ✓"

# ── 1. Disconnect ─────────────────────────────────────────────────────────────
- tapOn: "Disconnect"
- assertVisible: "Connect with ClickUp"

# ── 2. Reconnect ──────────────────────────────────────────────────────────────
- runFlow: ./_connect.yaml
- assertVisible: "Connected ✓"

# ── 3. Place widget on home screen ────────────────────────────────────────────
- runFlow: ./_add_widget.yaml

# ── 4. Widget config opens with browse tree (already connected) ───────────────
- assertVisible: "Browse Views"
- runFlow: ./_browse.yaml

# ── 5. Save ───────────────────────────────────────────────────────────────────
- tapOn: "Save & Add Widget"

# ── 6. Verify config activity closed and home screen is restored ───────────────
# WidgetConfigActivity calls setResult(RESULT_OK) and finish() — the launcher
# returns to the home screen with the newly configured widget.
#
# Note: Glance widget content is rendered in RemoteViews, which UIAutomator
# cannot traverse. Task names and the target label are therefore not assertable
# via Maestro. Visual verification is available in the Maestro screenshot report.
- assertNotVisible: "Browse Views"
- assertNotVisible: "Save & Add Widget"
