# Flow 03: reconfigure — full happy path, then re-open config via "Change widget
# settings" → change theme and view → save → verify config screen closes.
#
# Covers: theme change (regression for theme captured outside provideContent),
# view change, and reconfigure mode ("Save Changes" button instead of "Save & Add Widget").
appId: io.github.raven_wing.cuview
---
# Place and configure widget (reuse connect + browse subflows).
- runFlow: ./_chrome_setup.yaml
- runFlow: ./_add_widget.yaml
- assertVisible: "Connect with ClickUp"
- runFlow: ./_connect.yaml
- assertVisible: "Connected ✓"
- assertVisible: "Browse Views"
- runFlow: ./_browse.yaml
- tapOn: "Save & Add Widget"
- assertNotVisible: "Save & Add Widget"

# Re-open config via the resize overlay → "Change widget settings".
# Pixel Launcher shows the resize overlay automatically after Save & Add Widget. The
# overlay's "Change widget settings" entry triggers WidgetConfigActivity in reconfigure
# mode — same code path as long-pressing a placed widget and choosing Edit, just a more
# reliable entry point. Long-pressing a Glance widget on swiftshader is flaky: the
# launcher's popup either fails to appear (chrome) or is intercepted by tile click
# handlers (rows). The reconfigure path under test (Save Changes vs Save & Add Widget)
# is the same regardless of how the user opened the config screen.
- extendedWaitUntil:
    visible: "Change widget settings"
    timeout: 10000
- tapOn: "Change widget settings"

# Wait for WidgetConfigActivity to finish its onCreate IO work and call setContent.
- extendedWaitUntil:
    visible: "Save Changes"
    timeout: 15000
- tapOn: "Light"

# Change the selected view to Zebra (Mammals → Hoofed Animals → Zebra).
- tapOn: "Browse Views"
- extendedWaitUntil:
    visible:
      text: "Mammals"
    timeout: 5000
- tapOn: "Mammals"
- tapOn:
    text: "Hoofed Animals"
    optional: true
- extendedWaitUntil:
    visible:
      text: "Zebra"
    timeout: 5000
- tapOn: "Zebra"
- assertVisible: "Zebra"
- tapOn: "Zebra"

# Save and verify config screen dismissed.
- tapOn: "Save Changes"
- assertNotVisible: "Save Changes"
- assertNotVisible: "Browse Views"
