# Flow 01: add widget → connect → disconnect → reconnect → browse → save.
#
# Regression test for the disconnect/reconnect flow within WidgetConfigActivity.
# OAuth lives entirely in WidgetConfigActivity — there is no standalone launcher
# activity. The widget must be placed first to obtain a real widget ID before
# WidgetConfigActivity can be exercised.
#
# Run via: ./e2e/run.sh 01_disconnect_reconnect.yaml
#
appId: io.github.raven_wing.cuview
---
# ── 0. Place widget — WidgetConfigActivity opens unauthenticated ──────────────
- runFlow: ./_add_widget.yaml
- assertVisible: "Connect with ClickUp"

# ── 1. Connect ────────────────────────────────────────────────────────────────
- runFlow: ./_connect.yaml
- assertVisible: "Connected ✓"

# ── 2. Disconnect ─────────────────────────────────────────────────────────────
- tapOn: "Disconnect"
- assertVisible: "Connect with ClickUp"

# ── 3. Reconnect ──────────────────────────────────────────────────────────────
- runFlow: ./_connect.yaml
- assertVisible: "Connected ✓"

# ── 4. Browse views ───────────────────────────────────────────────────────────
- assertVisible: "Browse Views"
- runFlow: ./_browse.yaml

# ── 5. Save ───────────────────────────────────────────────────────────────────
- tapOn: "Save & Add Widget"

# ── 6. Verify home screen is restored with widget placed ──────────────────────
# Glance widget content lives in RemoteViews (not the a11y tree), so we can't
# assert widget text. Long-pressing the widget and confirming the launcher context
# menu appears is the closest proxy: it proves the home screen is in front (not
# Chrome's CCT — regression for the "back to ClickUp" bug) AND the widget is
# placed at the expected position.
- longPressOn:
    point: "50%, 60%"
- assertVisible: "Change widget settings"
- pressKey: Back
