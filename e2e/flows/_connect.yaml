# Subflow: tap "Connect with ClickUp" → fire OAuth callback → wait for "Connected ✓".
#
# Pre-condition:  WidgetConfigActivity is visible with "Connect with ClickUp" button.
# Post-condition: "Connected ✓" is visible.
#
# Mock mode (USE_MOCK_API=true):
#   1. Tapping "Connect with ClickUp" opens a Chrome Custom Tab (creating a Chrome task
#      in the recents stack — necessary for the "back to Chrome" regression in flow 01).
#   2. openLink fires cuview://oauth/callback directly via Android's intent dispatch,
#      bypassing any network dependency. The fixed state "mock_e2e_state" matches what
#      ConfigScreen stores before launching the CCT when USE_MOCK_API=true.
#   3. WidgetConfigActivity.handleOAuthCallback saves the token and brings WCA to front.
# Real mode (USE_MOCK_API=false): Chrome Custom Tab opens for ClickUp OAuth.
#   The Cloudflare Worker fires an intent:// callback which brings WidgetConfigActivity
#   to the front; "Connected ✓" appears once the token is saved.
appId: io.github.raven_wing.cuview
---
# Dismiss Chrome's First Run dialog before opening the CCT — no-op if already
# dismissed. Required because reset-state pm-clears Chrome between flows.
- tapOn: "Connect with ClickUp"
- extendedWaitUntil:
    visible: "Connect Workspace"
    timeout: 30000
- tapOn: "Connect Workspace"
- extendedWaitUntil:
    visible: "Connected ✓"
    timeout: 30000
