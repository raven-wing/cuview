# Subflow: tap "Connect with ClickUp" → complete OAuth via Chrome CCT → wait for "Connected ✓".
#
# Pre-condition:  WidgetConfigActivity is visible with "Connect with ClickUp" button.
# Post-condition: "Connected ✓" is visible.
#
# Mock mode: CCT opens localhost:8765 (adb-reversed to the host mock server). The mock
#   server echoes the app's state nonce back in the intent:// callback URL, which
#   WidgetConfigActivity validates before saving the token.
# Real mode: CCT opens ClickUp OAuth; the Cloudflare Worker fires the intent:// callback.
appId: io.github.raven_wing.cuview
---
# Dismiss Chrome's First Run dialog before opening the CCT — no-op if already
# dismissed. Required because reset-state pm-clears Chrome between flows.
- tapOn: "Connect with ClickUp"
- extendedWaitUntil:
    visible: "Connect Workspace"
    timeout: 90000
- tapOn: "Connect Workspace"
- extendedWaitUntil:
    visible: "Connected ✓"
    timeout: 30000
