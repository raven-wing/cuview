name: Worker CI

on:
  pull_request:
    branches: [main]
    paths:
      - worker/**

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5

      - name: Run tests
        run: uv run pytest tests/ -v
        working-directory: worker
