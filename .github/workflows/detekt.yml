name: Detekt

on:
  pull_request:
    branches:
      - main

jobs:
  detekt:
    name: Detekt Static Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    env:
      DETEKT_VERSION: 1.23.8

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download Detekt CLI
        run: |
          curl -sSLo detekt.jar \
            "https://github.com/detekt/detekt/releases/download/v${DETEKT_VERSION}/detekt-cli-${DETEKT_VERSION}-all.jar"

      - name: Run Detekt
        run: |
          java -jar detekt.jar \
            --input app/src/main/kotlin,app/src/test/kotlin,lint-rules/src/main/kotlin,lint-rules/src/test/kotlin \
            --config detekt.yml \
            --report sarif:detekt.sarif.json

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: detekt.sarif.json
          category: detekt
