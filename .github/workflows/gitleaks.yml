name: Gitleaks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  gitleaks:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required to post annotations on PRs
      pull-requests: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          # Full history — Gitleaks scans all commits in the range
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE is only required for private repos on paid plans;
          # remove or set the secret if you have a Gitleaks Enterprise license
