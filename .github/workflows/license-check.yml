name: License Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  license-check:
    name: Dependency License Review
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: low
          # Project is MIT. All copyleft licenses are incompatible.
          deny-licenses: >-
            GPL-2.0,
            GPL-2.0-only,
            GPL-2.0-or-later,
            GPL-3.0,
            GPL-3.0-only,
            GPL-3.0-or-later,
            AGPL-3.0,
            AGPL-3.0-only,
            AGPL-3.0-or-later,
            LGPL-2.0,
            LGPL-2.0-only,
            LGPL-2.0-or-later,
            LGPL-2.1,
            LGPL-2.1-only,
            LGPL-2.1-or-later,
            LGPL-3.0,
            LGPL-3.0-only,
            LGPL-3.0-or-later
