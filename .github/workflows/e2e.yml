name: E2E Tests (Maestro)

on:
  # Run on PRs touching app code or e2e flows
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'
  # Allow manual trigger for debugging
  workflow_dispatch:
    inputs:
      flow:
        description: 'Flow to run (00_smoke / 02_disconnect_reconnect)'
        required: false
        default: '00_smoke'

jobs:
  e2e:
    name: Maestro E2E
    # ubuntu-latest has KVM support, and google_apis images include Pixel Launcher
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      # KVM is needed for hardware-accelerated emulator on ubuntu runners
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK (USE_MOCK_API=true)
        run: ./gradlew assembleDebug
        env:
          CLICKUP_CLIENT_ID: ${{ secrets.CLICKUP_CLIENT_ID }}
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # google_apis target includes Pixel Launcher — required for widget placement in _add_widget.yaml
      - name: Run emulator + Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        env:
          CUE_SPACE: Mammals
          CUE_FOLDER: Hoofed Animals
          CUE_LIST: Horse
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          # Disable animations — Maestro taps can miss elements during transitions
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: make e2e-all

      - name: Upload Maestro report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report
          path: ~/.maestro/tests/
          retention-days: 7
