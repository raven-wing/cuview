name: E2E Tests (Maestro)

on:
  # Run on PRs touching app code or e2e flows
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'

jobs:
  e2e:
    name: Maestro E2E
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # KVM is needed for hardware-accelerated emulator on ubuntu runners
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash -s -- --version 2.3.0
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run emulator + Maestro flows
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu angle_indirect -noaudio -no-boot-anim
          script: make e2e

      - name: Upload Maestro report on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: maestro-report
          path: ~/.maestro/tests/
          retention-days: 7
