name: E2E Tests (Maestro)

on:
  # Run on PRs touching app code or e2e flows
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'e2e/**'
      - 'Makefile'
      - '.github/workflows/e2e.yml'

jobs:
  e2e:
    name: Maestro E2E
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # KVM is needed for hardware-accelerated emulator on ubuntu runners
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      - name: Build releaseTest APK (R8 on, mock API, debug-signed)
        run: ./gradlew assembleReleaseTest

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash -s -- --version 2.3.0
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run emulator + Maestro flows
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu angle_indirect -noaudio -no-boot-anim
          script: |
            set -e
            PACKAGE=io.github.raven_wing.cuview
            LAUNCHER=com.google.android.apps.nexuslauncher
            APK=app/build/outputs/apk/releaseTest/app-releaseTest.apk
            MAESTRO="$HOME/.maestro/bin/maestro"
            RECORDINGS="$HOME/e2e-recordings"
            mkdir -p "$RECORDINGS"

            adb uninstall "$PACKAGE" || true
            adb install "$APK"

            reset() { adb shell pm clear "$LAUNCHER" || true; adb shell pm clear "$PACKAGE"; }

            "$MAESTRO" record --local e2e/flows/00_chrome_setup.yaml "$RECORDINGS/00_chrome_setup.mp4"
            reset; "$MAESTRO" record --local e2e/flows/01_disconnect_reconnect.yaml "$RECORDINGS/01_disconnect_reconnect.mp4"
            reset; "$MAESTRO" record --local e2e/flows/02_cancel.yaml "$RECORDINGS/02_cancel.mp4"
            reset; "$MAESTRO" record --local e2e/flows/03_reconfigure.yaml "$RECORDINGS/03_reconfigure.mp4"

      - name: Upload recordings and report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts
          path: |
            ~/e2e-recordings/
            ~/.maestro/tests/
          retention-days: 7
