name: E2E Tests (Maestro)

on:
  # Run on PRs touching app code or e2e flows
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'e2e/**'
      - 'Makefile'
      - '.github/workflows/e2e.yml'

jobs:
  e2e:
    name: Maestro E2E
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Enable KVM group perms
        if: ${{ env.ACT != 'true' }}
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger
          sudo chmod 666 /dev/kvm

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e

      # Build before starting the emulator so Gradle doesn't compete with the
      # emulator for CI's 2 CPUs. Chrome's swangle_indirect GPU compositor crashes
      # under CPU pressure; building first keeps the emulator idle until the test runs.
      # make e2e re-runs assembleReleaseTest but Gradle's UP-TO-DATE check makes it instant.
      - name: Build releaseTest APK
        run: ./gradlew assembleReleaseTest

      - name: Install Maestro
        env:
          MAESTRO_VERSION: "2.4.0"
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # GPU mode rationale: see start-emulator in Makefile.
      - name: Run emulator + Maestro flows
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swangle_indirect -noaudio -no-boot-anim
          script: make e2e

      - name: Upload recordings and Maestro report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-artifacts
          path: |
            e2e/recordings/
            ~/.maestro/tests/
          retention-days: 7
